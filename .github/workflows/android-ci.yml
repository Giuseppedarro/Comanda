name: Android CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'waiter-app/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'waiter-app/**'

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: waiter-app/Comanda

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testStagingDebugUnitTest --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m"

      - name: Build app (staging debug)
        run: ./gradlew assembleStagingDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m"

name: Android Build & Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run unit tests
        working-directory: ./waiter-app/Comanda
        run: ./gradlew testDebugUnitTest
        continue-on-error: true

      - name: Build Release APK
        working-directory: ./waiter-app/Comanda
        run: ./gradlew assembleRelease

      - name: Build Release Bundle
        working-directory: ./waiter-app/Comanda
        run: ./gradlew bundleRelease

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./waiter-app/Comanda/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AAB to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./waiter-app/Comanda/app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # DEPLOY A GOOGLE PLAY STORE
      - name: Deploy to Google Play Store
        working-directory: ./waiter-app/Comanda
        run: ./gradlew bundleRelease publishBundle
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
